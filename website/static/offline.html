<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Offline | HYG Employee Portal</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    main {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>The portal shell is still available. Reconnect to load fresh employee data and submit changes.</p>
  </main>
</body>
</html>

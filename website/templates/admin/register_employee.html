{% extends "base.html" %}

{% block title %}Register Employee{% endblock %}

{% block extra_head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
  font-family: 'Inter', sans-serif;
}

/* ===== FIELD ===== */
.field {
  display: flex;
  flex-direction: column;
}

.field label {
  font-size: 13px;
  margin-bottom: 5px;
  font-weight: 500;
  color: #374151;
}

.field input,
.field select,
.field textarea {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 13px;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: #2563eb;
  outline: none;
}

/* ===== GRIDS (DESKTOP DEFAULT) ===== */
.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

/* ===== CARD ===== */
.form-section-card {
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

.form-section-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 15px;
  color: #1f2937;
}

/* ===== PHOTO ===== */
.photo-section {
  display: flex;
  gap: 25px;
  margin-bottom: 25px;
}

.photo-box {
  width: 180px;
  height: 180px;
  border-radius: 16px;
  border: 2px dashed #cbd5e1;
  background: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.photo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-placeholder {
  text-align: center;
  font-size: 13px;
  color: #64748b;
}

.photo-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ===== BUTTONS ===== */
.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.form-actions button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.form-actions button[type="submit"] {
  background: gold;
  color: white;
}

.form-actions button[type="reset"] {
  background: #e5e7eb;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  .grid-4,
  .grid-3,
  .grid-2 {
    grid-template-columns: repeat(2, 1fr);
  }

  textarea {
    grid-column: span 2;
  }

  .photo-section {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .photo-box {
    margin: 0 auto;
  }

  .form-actions {
    flex-direction: column;
  }

  .form-actions button {
    width: 100%;
  }
}

</style>
{% endblock %}

{% block page_content %}

<div>
  <h2 style="font-weight:700; margin-bottom: 10px; font-size:24px;">Register Employee</h2>

  <form action="{{ url_for('admin.add_employee') }}" method="POST" enctype="multipart/form-data">

    <!-- PERSONAL -->
    <div class="form-section-card">
      <h3 class="form-section-title">Personal Information</h3>

      <div class="photo-section">
        <label class="photo-box" for="photoInput">
          <img id="previewImg" style="display:none;">
          <div class="photo-placeholder" id="placeholder">
            📷<br>Click to Upload Photo
          </div>
        </label>

        <input type="file" id="photoInput" name="photo" hidden onchange="previewPhoto(event)">

        <div class="photo-info">
          <h4>Profile Upload</h4>
          <p>Upload a clear square photo</p>
        </div>
      </div>
      <div class="grid-4">
        <div class="field"><label>First Name</label><input name="first_name" required></div>
        <div class="field"><label>Middle Name</label><input name="middle_name"></div>
        <div class="field"><label>Last Name</label><input name="last_name" required></div>
        <div class="field"><label>Suffix</label><input name="suffix"></div>
      </div>

      <div class="grid-4">
        <div class="field"><label>Birth Date</label><input type="date" name="birth_date"></div>
        <div class="field"><label>Age</label><input type="number" name="age"></div>
        <div class="field">
          <label>Gender</label>
          <select name="gender">
            <option>Select</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="field"><label>Religion</label><input name="religion"></div>
      </div>2
    </div>

    <!-- CONTACT -->
    <div class="form-section-card">
      <h3 class="form-section-title">Contact Information</h3>

      <div class="grid-3">
        <div class="field"><label>Email</label><input type="email" name="email"></div>
        <div class="field"><label>Phone</label><input name="phone"></div>
        <div class="field"><label>Zip Code</label><input name="zipCode"></div>
      </div>

      <div class="field">
        <label>Address</label>
        <textarea name="present_address"></textarea>
      </div>
    </div>

    <!-- EMPLOYMENT (FIXED 2 COLUMN DESKTOP) -->
    <div class="form-section-card">
      <h3 class="form-section-title">Employment Details</h3>

      <div class="grid-2">
        <div class="field">
          <label>Company</label>
          <select name="company">
            <option>Select Company</option>
            {% for company in companies %}
            <option value="{{ company.company_name }}">{{ company.company_name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>Position</label>
          <input name="position">
        </div>

        <div class="field">
          <label>Hired Date</label>
          <input type="date" name="hired_date">
        </div>

        <div class="field">
          <label>Employee Type</label>
          <select name="employee_type">
            <option>Select</option>
            <option>Regular</option>
            <option>Probationary</option>
            <option>Trainee</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ACTION -->
    <div class="form-actions">
      <button type="reset">Clear</button>
      <button type="submit">Save Employee</button>
    </div>

  </form>
</div>

<script>
function previewPhoto(event) {
  const file = event.target.files[0];
  const img = document.getElementById("previewImg");
  const placeholder = document.getElementById("placeholder");

  const reader = new FileReader();
  reader.onload = e => {
    img.src = e.target.result;
    img.style.display = "block";
    placeholder.style.display = "none";
  };
  reader.readAsDataURL(file);
}

/* ===== DUPLICATE NAME CHECK ===== */
document.addEventListener("DOMContentLoaded", function () {
  const form = document.querySelector("form");

  form.addEventListener("submit", function (e) {
    const firstName = document.querySelector("input[name='first_name']").value.trim().toLowerCase();
    const lastName = document.querySelector("input[name='last_name']").value.trim().toLowerCase();

    // If empty, let required handle it
    if (!firstName || !lastName) return;

    // Simple rule: block same exact full name input (client-side only)
    const fullName = firstName + " " + lastName;

    // Optional: you can extend this list or fetch from backend later
    const existingEmployees = window.existingEmployees || [];3

    const isDuplicate = existingEmployees.some(emp =>
      (emp.first_name + " " + emp.last_name).toLowerCase() === fullName
    );

    if (isDuplicate) {
      e.preventDefault();

      alert("⚠️ Employee already exists with the same First Name and Last Name!");

      return false;
    }
  });
});
</script>

{% endblock %}

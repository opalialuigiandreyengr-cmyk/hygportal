{% extends "base.html" %}

{% block title %}Register Employee{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/employees.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
{% endblock %}

{% block page_content %}
<div class="container mt-4">

  <h2 class="mb-4" style="font-weight: bold; font-size: 26px;">Register Employee</h2>

  <form action="{{ url_for('admin.add_employee') }}" method="POST" enctype="multipart/form-data" class="employee-form">

    <!-- PERSONAL INFO -->
    <div class="form-section-card">
      <h3 class="form-section-title">Personal Information</h3>

      <div class="grid-4">
        <div class="field">
          <label>First Name *</label>
          <input type="text" name="first_name" required>
        </div>

        <div class="field">
          <label>Middle Name *</label>
          <input type="text" name="middle_name" required>
        </div>

        <div class="field">
          <label>Last Name *</label>
          <input type="text" name="last_name" required>
        </div>

        <div class="field">
          <label>Suffix</label>
          <input type="text" name="suffix">
        </div>
      </div>

      <div class="grid-4">
        <div class="field">
          <label>Birth Date *</label>
          <input type="date" name="birth_date" required>
        </div>

        <div class="field">
          <label>Age *</label>
          <input type="number" name="age" required>
        </div>

        <div class="field">
          <label>Gender *</label>
          <select name="gender" required>
            <option value="" disabled selected>Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Religion *</label>
          <input type="text" name="religion" required>
        </div>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="form-section-card">
      <h3 class="form-section-title">Contact Information</h3>

      <div class="grid-3">
        <div class="field">
          <label>Email *</label>
          <input type="email" name="email" required>
        </div>

        <div class="field">
          <label>Phone *</label>
          <input type="tel" name="phone" required>
        </div>

        <div class="field">
          <label>Zip Code</label>
          <input type="text" name="zipCode">
        </div>
      </div>

      <div class="field">
        <label>Address *</label>
        <textarea name="present_address" required></textarea>
      </div>
    </div>

    <!-- EMPLOYMENT -->
    <div class="form-section-card">
      <h3 class="form-section-title">Employment Details</h3>

      <div class="grid-2">
        <div class="field">
          <label>Employee ID *</label>
          <input type="text" name="employee_no" required>
        </div>

        <div class="field">
          <label>Company *</label>
          <select name="company" required>
            <option value="" disabled selected>Select Company</option>
            {% for company in companies %}
            <option value="{{ company.company_name }}">{{ company.company_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Department *</label>
          <input type="text" name="department" required>
        </div>

        <div class="field">
          <label>Position *</label>
          <input type="text" name="position" required>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Hired Date *</label>
          <input type="date" name="hired_date" required>
        </div>

        <div class="field">
          <label>Employee Type *</label>
          <select name="employee_type" required>
            <option value="" disabled selected>Select</option>
            <option>Regular</option>
            <option>Probationary</option>
            <option>Trainee</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Status *</label>
        <select name="employment_status" required>
          <option>Active</option>
          <option>Resigned</option>
          <option>Suspended</option>
          <option>On Leave</option>
        </select>
      </div>
    </div>

    <!-- GOVERNMENT IDS -->


    <!-- PHOTO -->
    <div class="form-section-card">
      <h3 class="form-section-title">Profile Photo</h3>
      <input type="file" name="photo">
    </div>

    <!-- ACTION -->
    <div class="form-actions">
      <button type="reset">Clear</button>
      <button type="submit">Save Employee</button>
    </div>

  </form>

</div>
{% endblock %}

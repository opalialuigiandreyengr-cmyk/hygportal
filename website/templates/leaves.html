{% extends "base.html" %}
{% block title %}Leaves | HYG Employee Portal{% endblock %}

{% block page_content %}
<style>
/* ===== BUTTON PRIMARY ===== */
.btn-primary{
  background:#facc15;
  color: black;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-primary:hover{
  background:#facc15;
  transform:translateY(-1px);
}

/* ===== FILTER BUTTONS ===== */
.filter-buttons{
  display:flex;
  gap:8px;
  margin:12px 0 16px 0;
  flex-wrap:wrap;
}

.filter-buttons button{
  border:1px solid #e2e8f0;
  background:#f8fafc;
  padding:6px 12px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  transition:all .2s ease;
}

.filter-buttons button:hover{
  background:#e2e8f0;
}

.filter-buttons button.active{
  background:#facc15;
  color:black;
  border-color:#facc15;
}

/* ===== CANCEL BUTTON ===== */
.btn-cancel{
  background:#ef4444;
  border:none;
  color:#fff;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  margin-left:8px;
  transition:all .2s ease;
}

.btn-cancel:hover{
  background:#dc2626;
}

/* ===== STATUS LABEL ===== */
.status{
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  font-weight:600;
}

.status.pending{
  background:#fef3c7;
  color:#92400e;
}

.status.approved{
  background:#dcfce7;
  color:#166534;
}

.status.rejected{
  background:#fee2e2;
  color:#991b1b;
}

/* ===== LEAVE ITEM CARD ===== */
.leave-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:8px;
  margin-bottom:10px;
  background:#fff;
}

.leave-info small{
  display:block;
  font-size:12px;
  color:#64748b;
}

/* ===== LAYOUT ===== */
.leave-layout {
  display:flex;
  gap:2rem;
}

/* FORM + RIGHT PANEL */
.leave-layout article.card {
  flex:1;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  body, html {
    height:100%;
    overflow:hidden; /* disable page scroll */
  }

  .leave-layout {
    flex-direction:column;
    height:100vh; /* fill screen */
  }

  /* Make form and recent leaves share space */
  .leave-layout article.card {
    flex:1 1 50%;
    min-height:0; /* allows internal scrolling */
    overflow-y:auto;
    padding:1rem;
  }

  .hero {
    padding:1rem;
  }
}
</style>

<section class="hero">
  <h1>Leave Management</h1>
  <p>Submit a leave request and track your leave status.</p>
</section>

<section class="leave-layout">

  <!-- FORM -->
  <article class="card">
    <h2 class="section-title">New Leave Request</h2>

    <form id="leaveForm">

      <div class="field">
        <label>Employee Name</label>
        <input type="text" id="employeeName" class="form-control" required>
      </div>

      <div class="field">
        <label>Leave Type</label>
        <select id="leaveType" class="form-select" required>
          <option value="">Select Type</option>
          <option>Annual Leave</option>
          <option>Sick Leave</option>
          <option>Casual Leave</option>
          <option>Maternity/Paternity</option>
          <option>Unpaid Leave</option>
        </select>
      </div>

      <div class="field">
        <label>Start Date</label>
        <input type="date" id="leaveStart" class="form-control" required>
      </div>

      <div class="field">
        <label>End Date</label>
        <input type="date" id="leaveEnd" class="form-control" required>
      </div>

      <div class="field full-width">
        <label>Reason</label>
        <textarea id="leaveReason" class="form-control" required></textarea>
      </div>

      <button type="submit" class="btn-primary">Submit Leave</button>

    </form>
  </article>

  <!-- RECENT LEAVES -->
  <article class="card">
    <h2 class="section-title">Recent Leaves</h2>

    <div class="summary-box">
      <span>Pending: <strong id="pendingCount">0</strong></span>
      <span>Approved: <strong id="approvedCount">0</strong></span>
      <span>Rejected: <strong id="rejectedCount">0</strong></span>
    </div>

    <div class="filter-buttons">
      <button data-filter="all" class="active">All</button>
      <button data-filter="approved">Approved</button>
      <button data-filter="pending">Pending</button>
      <button data-filter="rejected">Rejected</button>
    </div>

    <div class="leave-list" id="leaveList"></div>
  </article>

</section>

<script>
let leaves = JSON.parse(localStorage.getItem("leaves")) || [];
let currentFilter = "all";

const form = document.getElementById("leaveForm");
const leaveList = document.getElementById("leaveList");
const filterButtons = document.querySelectorAll(".filter-buttons button");

document.addEventListener("DOMContentLoaded", () => {
  renderLeaves();
  updateSummary();
});

form.addEventListener("submit", function(e){
  e.preventDefault();
  const leaveData = {
    id: Date.now(),
    employee_name: document.getElementById("employeeName").value,
    leave_type: document.getElementById("leaveType").value,
    start_date: document.getElementById("leaveStart").value,
    end_date: document.getElementById("leaveEnd").value,
    reason: document.getElementById("leaveReason").value,
    status: "pending"
  };
  leaves.unshift(leaveData);
  localStorage.setItem("leaves", JSON.stringify(leaves));
  form.reset();
  renderLeaves();
  updateSummary();
});

function renderLeaves(){
  leaveList.innerHTML="";
  leaves.filter(l => currentFilter==="all" || l.status===currentFilter)
        .forEach(leave => {
    const div = document.createElement("div");
    div.className="leave-item";
    div.innerHTML = `
      <div class="leave-info">
        <strong>${leave.leave_type}</strong> (${leave.employee_name})
        <small>${leave.start_date} to ${leave.end_date}</small>
        <small>Reason: ${leave.reason}</small>
      </div>
      <div>
        <span class="status ${leave.status}">${leave.status.toUpperCase()}</span>
        ${leave.status==="pending" ? `<button class="btn-cancel" onclick="cancelLeave(${leave.id})">Cancel</button>` : ""}
      </div>
    `;
    leaveList.appendChild(div);
  });
}

function cancelLeave(id){
  leaves = leaves.filter(l => l.id !== id);
  localStorage.setItem("leaves", JSON.stringify(leaves));
  renderLeaves();
  updateSummary();
}

function updateSummary(){
  document.getElementById("pendingCount").textContent = leaves.filter(l=>l.status==="pending").length;
  document.getElementById("approvedCount").textContent = leaves.filter(l=>l.status==="approved").length;
  document.getElementById("rejectedCount").textContent = leaves.filter(l=>l.status==="rejected").length;
}

filterButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    filterButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderLeaves();
  });
});
</script>

{% endblock %}
